<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Invest - Login</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#c00014",
                "primary-fixed-dim": "#f9a8b1",
                "surface": "#000000",
                "surface-container-low": "#0e0e0e",
                "on-surface": "#e5e2e1",
            },
            fontFamily: {
                headline: ["Manrope"],
                body: ["Inter"]
            }
        }
    }
}
</script>

<style>
body {
    background-color: #000000 !important;
    background-image: radial-gradient(#111 1px, transparent 1px) !important;
    background-size: 40px 40px !important;
}

.login-card {
    background-color: rgba(8, 8, 8, 0.9);
    border: 2px solid #c00014;
    box-shadow: 0 0 20px rgba(192, 0, 20, 0.2);
}

.input-precision {
    background-color: #0e0e0e !important;
    border: 1px solid #f9a8b1 !important;
    color: #f9a8b1 !important;
    transition: all 0.3s ease;
}

.input-precision:focus {
    border-color: #c00014 !important;
    color: #ffffff !important;
    box-shadow: 0 0 12px rgba(192, 0, 20, 0.4);
    outline: none;
}

.input-precision::placeholder {
    color: rgba(249, 168, 177, 0.4);
}

.neon-glow {
    box-shadow: 0 0 20px rgba(192, 0, 20, 0.3);
}
</style>

</head>

<body class="bg-surface font-body text-on-surface">

<header class="fixed top-0 w-full flex justify-between items-center px-6 h-16 bg-black/50 backdrop-blur-md border-b border-white/5">
    <h1 class="text-xl font-black uppercase tracking-tighter text-primary-fixed-dim">Precision Invest</h1>
</header>

<main class="min-h-screen flex justify-center items-center px-6">

<section class="w-full max-w-sm login-card p-8 rounded-2xl space-y-10">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="space-y-2">
          {% for category, message in messages %}
            <div class="p-3 rounded-lg border text-[10px] font-bold uppercase tracking-widest text-center
                {% if category == 'danger' %} border-primary text-primary bg-primary/10
                {% else %} border-primary-fixed-dim text-primary-fixed-dim bg-primary-fixed-dim/10 {% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="text-center">
        <h1 class="text-3xl font-black uppercase tracking-tighter">
            Acesse seu <span class="text-primary">Terminal</span>
        </h1>
    </div>

    <!-- FORM CORRIGIDO -->
    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">

        <div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-primary-fixed-dim ml-2 mb-2 block">Email</label>
            <input
                type="email"
                name="form-email"
                required
                placeholder="nome@email.com"
                class="w-full p-4 rounded-lg input-precision"
            >
        </div>

        <div>
            <label class="text-[10px] font-bold uppercase tracking-widest text-primary-fixed-dim ml-2 mb-2 block">Senha</label>
            <input
                type="password"
                name="form-senha"
                required
                placeholder="••••••••"
                class="w-full p-4 rounded-lg input-precision"
            >
        </div>

        <button type="submit" class="w-full h-14 bg-gradient-to-br from-primary-fixed-dim to-primary text-white font-black uppercase tracking-widest rounded-lg neon-glow hover:brightness-110 transition-all active:scale-95">
            Entrar
        </button>

    </form>

    <!-- LINK CORRIGIDO -->
    <p class="text-center text-[10px] font-bold uppercase tracking-widest text-gray-500">
        Não tem conta?
        <a href="{{ url_for('auth.cadastro') }}" class="text-primary-fixed-dim hover:text-primary transition-colors">
            Cadastrar
        </a>
    </p>

</section>

</main>

</body>
</html>
