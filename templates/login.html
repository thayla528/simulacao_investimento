<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Precision Invest - Login</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#c00014",
                "primary-fixed-dim": "#ffb4ab",
                "surface": "#f9f9f9",
                "surface-container-low": "#f3f3f3",
                "surface-container-lowest": "#ffffff",
                "surface-bright": "#f9f9f9",
                "on-surface": "#1a1c1c",
                "outline": "#827473",
                "secondary-container": "#fecbcb"
            },
            fontFamily: {
                headline: ["Manrope"],
                body: ["Inter"]
            }
        }
    }
}
</script>

<style>
.neon-quartz-glow {
    box-shadow: 0 0 20px rgba(192, 0, 20, 0.1), 0 0 40px rgba(254, 203, 203, 0.2);
}
</style>

</head>

<body class="bg-surface font-body text-on-surface">

<header class="fixed top-0 w-full flex justify-between items-center px-6 h-16 bg-surface-bright">
    <h1 class="text-xl font-extrabold text-primary">Precision Invest</h1>
</header>

<main class="min-h-screen pt-20 flex justify-center items-center px-6">

<section class="w-full max-w-sm space-y-10">

<div>
    <h1 class="text-3xl font-bold">
        Acesse seu <span class="text-primary">Terminal</span>
    </h1>
</div>

<!-- 🔥 FORM FLASK -->
<form method="POST" class="space-y-6">

    <!-- EMAIL -->
    <div>
        <label class="text-sm text-gray-500">Email</label>
        <input
            type="email"
            name="form-email"
            required
            placeholder="nome@email.com"
            class="w-full p-4 rounded-lg bg-surface-container-low focus:outline-none"
        >
    </div>

    <!-- SENHA -->
    <div>
        <label class="text-sm text-gray-500">Senha</label>
        <input
            type="password"
            name="form-senha"
            required
            placeholder="••••••••"
            class="w-full p-4 rounded-lg bg-surface-container-low focus:outline-none"
        >
    </div>

    <!-- BOTÃO -->
    <button class="w-full h-14 bg-gradient-to-br from-primary to-primary-fixed-dim text-white font-bold rounded-lg neon-quartz-glow">
        Entrar
    </button>

</form>

<!-- CADASTRO -->
<p class="text-center text-sm mt-4">
    Não tem conta?
    <a href="/cadastro" class="text-primary font-bold">Cadastrar</a>
</p>

</section>

</main>

</body>
</html>
