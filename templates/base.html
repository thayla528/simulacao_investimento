<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}Meu Sistema{% endblock %}</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>


<!-- Fontes -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- Estilos base -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
    body { padding-bottom: 5.5rem; /* espaço para navbar fixa */ }
</style>
</head>

<body class="bg-[#f9f9f9] font-body text-on-surface">

<!-- MAIN CONTENT -->
<main class="p-6">
    {% block conteudo %}
    {% endblock %}
</main>

<!-- NAVBAR FIXA INFERIOR -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-[#ffffff] dark:bg-slate-900 border-t border-[#f3f3f3] dark:border-slate-800 shadow-[0px_-4px_12px_rgba(26,28,28,0.04)]">

    <!-- Perfil Ativo -->
    <a class="flex flex-col items-center justify-center text-[#c00014] dark:text-[#ffb4ab] bg-[#fecbcb]/30 rounded-xl px-3 py-1 active:scale-90 transition-all duration-200" href="{{ url_for('perfil') }}">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="font-inter text-[11px] font-bold uppercase tracking-[0.1em] mt-1">Perfil</span>
    </a>

    <!-- Cadastro de ações -->
    <a class="flex flex-col items-center justify-center text-[#c00014] dark:text-[#ffb4ab] bg-[#fecbcb]/30 rounded-xl px-3 py-1 active:scale-90 transition-all duration-200" href="{{ url_for('cadastro_de_acao') }}">
        <span class="font-inter text-[11px] font-bold uppercase tracking-[0.1em] mt-1">Cadastro de ações</span>
    </a>

     <a class="flex flex-col items-center justify-center text-[#c00014] dark:text-[#ffb4ab] bg-[#fecbcb]/30 rounded-xl px-3 py-1 active:scale-90 transition-all duration-200" href="{{ url_for('simulador') }}">
        <span class="font-inter text-[11px] font-bold uppercase tracking-[0.1em] mt-1">Renda fixa</span>
    </a>

    <!-- Botão de Sair -->
    <a class="flex flex-col items-center justify-center text-[#c00014] dark:text-[#ffb4ab] bg-[#fecbcb]/30 rounded-xl px-3 py-1 active:scale-90 transition-all duration-200" href="{{ url_for('logout') }}"
           class="bg-gradient-pink-red text-white font-black py-2 px-4 rounded-xl shadow-md uppercase text-[10px] tracking-widest hover:brightness-110 transition-all">
           Logout
    </a>

</nav>

</body>
</html>
