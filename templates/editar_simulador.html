{% extends 'base.html' %}

{% block conteudo %}
<style>
:root {
    --precision-red: #c00014;
    --pink-baby: #201f1f;
    --pink-text: #f9a8b1;
}

body {
    background-color: #000000 !important;
    background-image: radial-gradient(#111 1px, transparent 1px) !important;
    background-size: 40px 40px !important;
    color: #e5e2e1;
}

.text-gradient-pink-red {
    background: linear-gradient(to right, var(--pink-text), var(--precision-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
}

.bg-gradient-pink-red {
    background: linear-gradient(135deg, var(--pink-text), var(--precision-red));
}

.card-editar {
    background-color: #0e0e0e;
    border: 1px solid #2a2a2a;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.input-precision {
    background-color: #0e0e0e !important;
    border: 1px solid #2a2a2a !important;
    color: #e5e2e1 !important;
    border-radius: 8px;
    font-size: 0.8rem;
    padding: 12px 14px !important;
}

.input-precision:focus {
    border-color: var(--precision-red) !important;
    outline: none;
    box-shadow: 0 0 10px rgba(192, 0, 20, 0.2);
}

.label-precision {
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--precision-red);
    margin-bottom: 6px;
    margin-left: 4px;
    display: block;
}
</style>

<div class="max-w-md mx-auto mt-20 px-4 pb-20">

    <!-- HEADER -->
    <div class="text-center mb-10">
        <h1 class="text-3xl font-black uppercase tracking-tighter">
            <span class="text-gradient-pink-red">Ajustar_Simulação</span>
        </h1>
        <p class="text-[9px] font-bold tracking-[0.4em] text-white/20 uppercase mt-1">
            Revisão de Parâmetros Operacionais
        </p>
    </div>

    <!-- FORMULÁRIO -->
    <div class="card-editar rounded-sm p-10 relative">
        <a href="{{ url_for('simulador') }}" class="absolute top-4 right-6 text-white/20 hover:text-white transition text-xs font-bold uppercase tracking-widest">
            ✕
        </a>

        <form method="POST" class="space-y-5">
            <div>
                <label class="label-precision">Tipo de Ativo</label>
                <select name="tipo" class="w-full input-precision appearance-none" required>
                    <option value="CDI" {% if investimento.tipo == 'CDI' %}selected{% endif %}>CDI</option>
                    <option value="LCI" {% if investimento.tipo == 'LCI' %}selected{% endif %}>LCI</option>
                    <option value="LCA" {% if investimento.tipo == 'LCA' %}selected{% endif %}>LCA</option>
                    <option value="SELIC" {% if investimento.tipo == 'SELIC' %}selected{% endif %}>TESOURO SELIC</option>
                    <option value="PREFIXADO" {% if investimento.tipo == 'PREFIXADO' %}selected{% endif %}>PREFIXADO</option>
                    <option value="IPCA" {% if investimento.tipo == 'IPCA' %}selected{% endif %}>IPCA+</option>
                </select>
            </div>

            <div>
                <label class="label-precision">Valor Investido (R$)</label>
                <input type="number" step="0.01" name="valor_investido" class="w-full input-precision"
                       value="{{ investimento.valor_investido }}" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-precision">Taxa (%)</label>
                    <input type="number" step="0.01" name="taxa" class="w-full input-precision"
                           value="{{ investimento.taxa }}" required>
                </div>
                <div>
                    <label class="label-precision">Prazo (Meses)</label>
                    <input type="number" name="tempo" class="w-full input-precision"
                           value="{{ investimento.tempo }}" required>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="bg-gradient-pink-red w-full py-4 rounded-sm text-white font-black uppercase text-[10px] tracking-[0.2em] shadow-lg hover:brightness-110 transition">
                    Atualizar_Simulação
                </button>
            </div>

            <a href="{{ url_for('simulador') }}" class="block text-center text-white/20 hover:text-white transition text-[9px] font-bold uppercase tracking-[0.2em] mt-4">
                Cancelar e Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
