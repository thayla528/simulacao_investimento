{% extends 'base.html' %}

{% block conteudo %}
<style>
:root {
    --precision-red: #c00014;
    --pink-baby: #fecbcb;
    --pink-text: #f9a8b1;
}

.text-gradient-pink-red {
    background: linear-gradient(to right, var(--pink-text), var(--precision-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
}

.input-precision {
    background-color: #fecbcb22 !important;
    border: 1px solid var(--pink-baby) !important;
    color: var(--precision-red) !important;
    border-radius: 10px;
    font-size: 0.8rem;
    padding: 8px 12px !important;
}

button.bg-gradient-pink-red {
    background: linear-gradient(135deg, var(--pink-text), var(--precision-red));
    color: white;
    font-weight: bold;
}
</style>

<div class="max-w-md mx-auto mt-20 p-6 bg-white rounded-2xl border-4" style="border-color: var(--pink-baby);">
    <h2 class="text-center text-2xl font-black text-gradient-pink-red mb-6">Editar Investimento</h2>

    <form method="POST">
        <label class="block mb-2 font-bold">Tipo</label>
        <select name="tipo" class="w-full input-precision mb-4" required>
            <option value="CDI"> {% if investimento.tipo == 'CDI' %}selected{% endif %}>CDI</option>
            <option value="LCI"> {% if investimento.tipo == 'LCI' %}selected{% endif %}>LCI</option>
            <option value="LCA"> {% if investimento.tipo == 'LCA' %}selected{% endif %}>LCA</option>
            <option value="SELIC"> {% if investimento.tipo == 'SELIC' %}selected{% endif %}>SELIC</option>
        </select>

        <label class="block mb-2 font-bold">Valor Investido (R$)</label>
        <input type="number" step="0.01" name="valor_investido" class="w-full input-precision mb-4"
               value="{{ investimento.valor_investido }}" required>

        <label class="block mb-2 font-bold">Taxa (%)</label>
        <input type="number" step="0.01" name="taxa" class="w-full input-precision mb-4"
               value="{{ investimento.taxa }}" required>

        <label class="block mb-2 font-bold">Tempo (meses)</label>
        <input type="number" name="tempo" class="w-full input-precision mb-4"
               value="{{ investimento.tempo }}" required>

        <button type="submit" class="bg-gradient-pink-red w-full py-3 rounded-xl mt-4">Atualizar</button>
    </form>
</div>
{% endblock %}
