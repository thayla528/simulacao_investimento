{% extends 'base.html' %}

{% block conteudo %}
<style>
:root {
    --precision-red: #c00014;
    --pink-baby: #201f1f;
    --pink-text: #f9a8b1;
}

body {
    background-color: #000000 !important;
    background-image: radial-gradient(#111 1px, transparent 1px) !important;
    background-size: 40px 40px !important;
    color: #e5e2e1;
}

.text-gradient-pink-red {
    background: linear-gradient(to right, var(--pink-text), var(--precision-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-precision {
    background-color: #0e0e0e !important;
    border: 1px solid #2a2a2a !important;
    color: #e5e2e1 !important;
    border-radius: 8px;
    font-size: 0.85rem;
    padding: 12px 14px !important;
}

.input-precision:focus {
    border-color: var(--precision-red) !important;
    outline: none;
}

.bg-gradient-pink-red {
    background: linear-gradient(135deg, var(--pink-text), var(--precision-red));
}
</style>

<div class="max-w-2xl mx-auto mt-20 px-6">

    <!-- HEADER -->
    <div class="mb-12 text-center">
        <h1 class="text-3xl font-black text-gradient-pink-red uppercase tracking-tighter">
            Renda Fixa
        </h1>
        <p class="text-[10px] text-white/30 tracking-[0.3em] uppercase mt-2">
            Ajuste de parâmetros do ativo
        </p>
    </div>

    <!-- CARD -->
    <div class="bg-[#0c0c0c] border border-[#1c1b1b] rounded-xl p-10 shadow-xl">

        <form method="POST"
              action="{{ url_for('simulador.editar_simulador', id=investimento.id) }}"
              class="space-y-6">

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="text-[10px] text-white/40 uppercase">Tipo</label>
                <input type="text" name="tipo" value="{{ investimento.tipo }}" class="w-full input-precision" required>
            </div>

            <div>
                <label class="text-[10px] text-white/40 uppercase">Valor Investido</label>
                <input type="number" step="0.01" name="valor_investido" value="{{ investimento.valor_investido }}" class="w-full input-precision" required>
            </div>

            <div>
                <label class="text-[10px] text-white/40 uppercase">Taxa (% ao ano)</label>
                <input type="number" step="0.01" name="taxa" value="{{ investimento.taxa }}" class="w-full input-precision" required>
            </div>

            <div>
                <input type="number" name="tempo"
                   placeholder="TEMPO"
                   class="w-full input-precision" required>
            </div>

           <div>
                <label>Tipo de Tempo</label>
                <select name="tipo_tempo" class="w-full input-precision">
                    <option value="meses">Meses</option>
                    <option value="anos">Anos</option>
                </select>
            </div>

            <!-- BOTÕES -->
            <div class="flex gap-4 pt-4">

                <button type="submit"
                        class="w-full primary-gradient py-4 rounded-md font-bold tracking-widest hover:brightness-110 active:scale-95 transition">
                    SALVAR_ALTERAÇÕES
                </button>

                <button type="button"
                        onclick="history.back()"
                        class="w-full border border-gray-600 py-3 rounded-md text-gray-400 hover:bg-gray-800 transition">
                    CANCELAR
                </button>

            </div>

        </form>
    </div>
</div>

{% endblock %}
