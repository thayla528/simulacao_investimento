<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Precision Invest - Sign Up</title>

<!-- Tailwind CSS com plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Fontes -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- Configuração do Tailwind (cores, fontes) -->
<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "primary": "#c00014",
                "primary-fixed-dim": "#ffb4ab",
                "surface": "#f9f9f9",
                "surface-container-low": "#f3f3f3",
                "surface-container-lowest": "#ffffff",
                "surface-bright": "#f9f9f9",
                "on-surface": "#1a1c1c",
                "outline": "#827473",
                "secondary-container": "#fecbcb"
            },
            fontFamily: {
                headline: ["Manrope"],
                body: ["Inter"]
            }
        }
    }
}
</script>

<!-- Estilos adicionais -->
<style>
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
/* Animação da linha inferior do input */
.group-focus-within\:w-full {
    width: 100%;
    transition: width 0.5s;
}
</style>
</head>

<body class="bg-surface font-body text-on-surface overflow-x-hidden">

<!-- Main centralizado verticalmente -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 relative">

    <!-- Formas de fundo decorativas -->
    <div class="absolute top-1/4 -left-20 w-64 h-64 bg-secondary-container opacity-30 rounded-full blur-[80px] -z-10"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-primary-container opacity-20 rounded-full blur-[100px] -z-10"></div>

    <!-- Seção central do formulário -->
    <section class="w-full max-w-sm space-y-12 text-center">

        <!-- Cabeçalho centralizado -->
        <div>
            <p class="label-sm font-label text-[0.6875rem] uppercase tracking-[0.1em] text-on-surface-variant mb-2">System Terminal V2.4</p>
            <h1 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface leading-none mb-2">
                Criar Conta
            </h1>
            <p class="text-on-surface-variant/80 mb-6">
                Inicie sua jornada no ecossistema de investimentos de alta precisão.
            </p>
            <!-- Linha horizontal abaixo do título -->
            <div class="h-1 w-12 bg-primary mx-auto"></div>
        </div>

        <!-- Formulário de cadastro -->
        <form method="POST" action="{{ url_for('cadastro') }}" class="space-y-6">

            <div class="space-y-6">

                <!-- Campo Nome -->
                <div class="relative group">
                    <label class="block label-sm font-label text-[0.6875rem] uppercase tracking-[0.1em] text-on-surface-variant mb-2 ml-1">Nome Completo</label>
                    <div class="bg-surface-container-low rounded-lg p-4 transition-all duration-300 focus-within:bg-surface-container-lowest">
                        <input type="text" name="nome" placeholder="Ex: Arthur Morgan"
                            class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 font-body"/>
                    </div>
                    <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-500 group-focus-within:w-full"></div>
                </div>

                <!-- Campo Email -->
                <div class="relative group">
                    <label class="block label-sm font-label text-[0.6875rem] uppercase tracking-[0.1em] text-on-surface-variant mb-2 ml-1">E-mail Corporativo</label>
                    <div class="bg-surface-container-low rounded-lg p-4 transition-all duration-300 focus-within:bg-surface-container-lowest">
                        <input type="email" name="email" placeholder="nome@exemplo.com"
                            class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 font-body"/>
                    </div>
                    <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-500 group-focus-within:w-full"></div>
                </div>

                <!-- Campo Senha -->
                <div class="relative group">
                    <label class="block label-sm font-label text-[0.6875rem] uppercase tracking-[0.1em] text-on-surface-variant mb-2 ml-1">Senha</label>
                    <div class="bg-surface-container-low rounded-lg p-4 transition-all duration-300 focus-within:bg-surface-container-lowest">
                        <input type="password" name="senha" placeholder="••••••••"
                            class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-outline focus:ring-0 font-body"/>
                    </div>
                    <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-500 group-focus-within:w-full"></div>
                </div>

            </div>

            <!-- Botão de enviar -->
            <div class="pt-6">
                <button class="w-full h-14 bg-gradient-to-br from-primary to-primary-fixed-dim text-on-primary font-headline font-bold uppercase tracking-widest text-sm rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-3 neon-quartz-glow">
                    Criar Conta
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </button>
            </div>

        </form>

    </section>
</main>
</body>
</html>
