{% extends 'base.html' %}

{% block conteudo %}
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<style>
    .cyber-glow {
        box-shadow: 0 0 15px rgba(192, 0, 20, 0.15);
    }
    .primary-gradient {
        background: linear-gradient(135deg, #c00014 0%, #93000c 100%);
    }
</style>

<div class="bg-[#0b0e14] text-white min-h-screen pb-24">

    <!-- HEADER -->
    <header class="flex justify-between items-center px-6 py-4">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 hover:bg-gray-800 rounded-md flex items-center justify-center">
                ←
            </button>

        </div>
    </header>

    <main class="px-4 max-w-lg mx-auto">

        <!-- BADGE -->
        <div class="flex items-center justify-between mb-8 bg-[#141821] p-4 rounded-lg border-l-4 border-[#c00014]">
            <div>
                <p class="text-[10px] uppercase text-gray-400 mb-1">Empresa Atual</p>
                <h2 class="text-3xl font-black">{{ empresa.ticker }}</h2>
            </div>

            <div class="text-right">
                <span class="text-[10px] px-2 py-1 bg-[#c00014] text-white font-bold">
                    ATIVO
                </span>
                <p class="text-xs text-gray-400 mt-1">
                    ID: {{ empresa.id }}
                </p>
            </div>
        </div>

        <!-- FORM -->
        <div class="bg-[#141821] border-t-2 border-[#c00014]/20 p-6 rounded-xl cyber-glow">

            <h3 class="text-sm tracking-widest font-bold mb-6 uppercase text-gray-300">
                DADOS DA EMPRESA
            </h3>

            <form action="{{ url_for('empresas.editar_empresa', id=empresa.id) }}" method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- TICKER -->
                <div>
                    <label class="text-xs uppercase text-gray-400">Ticker</label>
                    <input name="ticker"
                           value="{{ empresa.ticker }}"
                           class="w-full bg-[#1d2026] border-b border-gray-600 px-4 py-3 uppercase font-bold focus:border-[#c00014] outline-none"
                           required>
                </div>

                <!-- EMPRESA -->
                <div>
                    <label class="text-xs uppercase text-gray-400">Nome da Empresa</label>
                    <input name="empresa"
                           value="{{ empresa.empresa }}"
                           class="w-full bg-[#1d2026] border-b border-gray-600 px-4 py-3 focus:border-[#c00014] outline-none"
                           required>
                </div>

                <!-- SETOR -->
                <div>
                    <label class="text-xs uppercase text-gray-400">Setor</label>
                    <input name="setor"
                           value="{{ empresa.setor }}"
                           class="w-full bg-[#1d2026] border-b border-gray-600 px-4 py-3 focus:border-[#c00014] outline-none"
                           required>
                </div>

                <div class="grid grid-cols-2 gap-4">

                    <!-- PREÇO -->
                    <div>
                        <label class="text-xs uppercase text-gray-400">Preço (R$)</label>
                        <input type="number" step="0.01"
                               name="preco_acao"
                               value="{{ empresa.preco_acao }}"
                               class="w-full bg-[#1d2026] border-b border-gray-600 px-4 py-3 focus:border-[#c00014] outline-none"
                               required>
                    </div>

                    <!-- LUCRO -->
                    <div>
                        <label class="text-xs uppercase text-gray-400">Lucro (R$)</label>
                        <input type="number"
                               name="lucro_liquido"
                               value="{{ empresa.lucro_liquido }}"
                               class="w-full bg-[#1d2026] border-b border-gray-600 px-4 py-3 focus:border-[#c00014] outline-none"
                               required>
                    </div>

                </div>

                <!--  NOVO CAMPO -->
                <div>
                    <label class="text-xs uppercase text-gray-400">Quantidade de Ações</label>
                    <input type="number"
                           name="num_acoes"
                           value="{{ empresa.num_acoes }}"
                           class="w-full bg-[#1d2026] border-b border-gray-600 px-4 py-3 focus:border-[#c00014] outline-none"
                           required>
                </div>

                <!-- BOTÕES -->
                <div class="pt-4 space-y-3">

                    <button type="submit"
                            class="w-full primary-gradient py-4 rounded-md font-bold tracking-widest hover:brightness-110 active:scale-95 transition">
                        SALVAR ALTERAÇÕES
                    </button>

                    <button type="button"
                            onclick="history.back()"
                            class="w-full border border-gray-600 py-3 rounded-md text-gray-400 hover:bg-gray-800 transition">
                        CANCELAR
                    </button>

                </div>

            </form>
        </div>
    </main>
</div>

{% endblock %}
