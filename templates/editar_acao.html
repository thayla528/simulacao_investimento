{% extends 'base.html' %}

{% block conteudo %}
<style>
:root {
    --precision-red: #c00014;
    --pink-baby: #1c1b1b;
    --pink-text: #f9a8b1;
}

body {
    background-color: #000000 !important;
    background-image: radial-gradient(#111 1px, transparent 1px) !important;
    background-size: 40px 40px !important;
    color: #e5e2e1;
}

.text-gradient-pink-red {
    background: linear-gradient(to right, var(--pink-text), var(--precision-red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
}

.bg-gradient-pink-red {
    background: linear-gradient(135deg, var(--pink-text), var(--precision-red));
}

.input-precision {
    background-color: #0e0e0e !important;
    border: 1px solid #2a2a2a !important;
    color: #e5e2e1 !important;
    border-radius: 8px;
    font-size: 0.85rem;
    padding: 12px 16px !important;
}

.input-precision:focus {
    border-color: var(--precision-red) !important;
    box-shadow: 0 0 10px rgba(192, 0, 20, 0.2);
    outline: none;
}

.card-editar {
    background-color: #0c0c0c;
    border: 1px solid #1c1b1b;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.label-precision {
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--precision-red);
    margin-bottom: 6px;
    margin-left: 4px;
    display: block;
}
</style>

<div class="max-w-2xl mx-auto mt-20 px-4 pb-20">

    <!-- HEADER -->
    <div class="mb-10 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter">
                <span class="text-gradient-pink-red">Modificar Ativo</span>
            </h1>
            <p class="text-[9px] font-bold tracking-[0.4em] text-white/30 uppercase mt-1">
                {{ empresa.ticker }} • ID RECURSO: {{ empresa.id }}
            </p>
        </div>
        <a href="{{ url_for('perfil') }}" class="text-white/20 hover:text-white transition flex items-center gap-2 text-[10px] font-black uppercase tracking-widest">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Cancelar
        </a>
    </div>

    <!-- FORMULÁRIO DE EDIÇÃO -->
    <div class="card-editar rounded-sm p-10">
        <form action="{{ url_for('editar_empresa', id=empresa.id) }}" method="POST" class="space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="label-precision">Ticker</label>
                    <input type="text" name="ticker" value="{{ empresa.ticker }}" class="w-full input-precision uppercase" required>
                </div>
                <div>
                    <label class="label-precision">Empresa</label>
                    <input type="text" name="empresa" value="{{ empresa.empresa }}" class="w-full input-precision" required>
                </div>
            </div>

            <div>
                <label class="label-precision">Setor de Atuação</label>
                <input type="text" name="setor" value="{{ empresa.setor }}" class="w-full input-precision" required>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="label-precision">Qtd Ações</label>
                    <input type="number" name="num_acoes" value="{{ empresa.num_acoes }}" class="w-full input-precision" required>
                </div>
                <div class="md:col-span-2">
                    <label class="label-precision">Preço Médio (R$)</label>
                    <input type="number" step="0.01" name="preco_acao" value="{{ empresa.preco_acao }}" class="w-full input-precision" required>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-precision">Lucro Líquido</label>
                    <input type="number" step="0.01" name="lucro_liquido" value="{{ empresa.lucro_liquido }}" class="w-full input-precision">
                </div>
                <div>
                    <label class="label-precision">Patrimônio</label>
                    <input type="number" step="0.01" name="patrimonio" value="{{ empresa.patrimonio }}" class="w-full input-precision">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-precision">Ativos</label>
                    <input type="number" step="0.01" name="ativos" value="{{ empresa.ativos }}" class="w-full input-precision">
                </div>
                <div>
                    <label class="label-precision">Dívida</label>
                    <input type="number" step="0.01" name="divida" value="{{ empresa.divida }}" class="w-full input-precision">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-precision">Lote Padrão</label>
                    <input type="number" name="lote" value="{{ empresa.lote }}" class="w-full input-precision">
                </div>
                <div>
                    <label class="label-precision">Tipo</label>
                    <select name="tipo_acao" class="w-full input-precision appearance-none">
                        <option value="ON" {% if empresa.tipo_acao == 'ON' %}selected{% endif %}>ON (Ordinária)</option>
                        <option value="PN" {% if empresa.tipo_acao == 'PN' %}selected{% endif %}>PN (Preferencial)</option>
                        <option value="UNIT" {% if empresa.tipo_acao == 'UNIT' %}selected{% endif %}>UNIT</option>
                    </select>
                </div>
            </div>

            <div class="pt-6 border-t border-white/5 flex gap-4">
                <button type="submit" class="flex-1 bg-gradient-pink-red text-white font-black py-4 rounded-sm shadow-lg uppercase text-[10px] tracking-[0.2em] hover:brightness-110 transition">
                    Atualizar_Registro
                </button>
                <a href="{{ url_for('perfil') }}" class="px-8 border border-white/10 flex items-center justify-center text-white/40 font-black uppercase text-[10px] tracking-[0.2em] hover:bg-white/5 transition">
                    Descartar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
